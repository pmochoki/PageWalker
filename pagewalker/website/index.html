<!DOCTYPE html>
<html lang="en" data-pw-page="web-app">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff6b1a" />
    <meta name="description" data-i18n-meta="appShell.metaDescription" content="Pagewalker web app: library, discover, social, clubs, and reader tools." />
    <meta property="og:title" content="Pagewalker" />
    <meta property="og:description" data-i18n-meta="appShell.metaDescription" content="Pagewalker web app: library, discover, social, clubs, and reader tools." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pagewalker.org/" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pagewalker" />
    <meta name="twitter:description" data-i18n-meta="appShell.metaDescription" content="Pagewalker web app: library, discover, social, clubs, and reader tools." />
    <link rel="canonical" href="https://pagewalker.org/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <title data-i18n-title="appShell.title">Pagewalker — Web App</title>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("pw-theme");
          var v = m === "light" || m === "dark" ? m
            : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", v);
        } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skip">Skip to content</a>
    <header class="site-header">
      <div class="wrap inner app-header-inner">
        <a class="logo" href="/" data-link-route="/">Pagewalker</a>
        <nav class="nav app-nav" aria-label="Main">
          <a href="/" data-link-route="/" data-i18n="appNav.home">Home</a>
          <a href="/discover" data-link-route="/discover" data-i18n="appNav.discover">Discover</a>
        </nav>
        <div class="app-header-right">
          <div class="site-controls">
            <select class="pw-select pw-lang-select" data-i18n-attr="aria-label:toolbar.language" aria-label="Language">
              <option value="en">English</option>
              <option value="hu">Magyar</option>
            </select>
            <button type="button" class="pw-theme-toggle" data-i18n-attr="aria-label:toolbar.theme" aria-label="Theme">
              <svg data-icon="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
              <svg data-icon="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
              <svg data-icon="system" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>
            </button>
          </div>
          <div class="pw-user-menu" id="pw-user-menu">
            <button
              type="button"
              class="pw-user-avatar"
              id="pw-user-avatar"
              aria-expanded="false"
              aria-haspopup="true"
              aria-controls="pw-user-dropdown"
              data-i18n-attr="aria-label:toolbar.userMenu"
            >
              <span class="pw-user-avatar__face pw-user-avatar__face--text" id="pw-user-initial" hidden></span>
              <span class="pw-user-avatar__face pw-user-avatar__face--icon" id="pw-user-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
            </button>
            <div class="pw-user-menu__panel" id="pw-user-dropdown" role="region" hidden>
              <div class="pw-user-menu__body" id="pw-user-menu-body"></div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main id="main" class="wrap web-app-main">
      <div id="pw-err" class="pw-banner" hidden></div>
      <div id="pw-ok" class="pw-banner pw-banner--success" hidden></div>
      <section id="pw-route-content" class="webapp-content"></section>
    </main>

    <footer>
      <div class="wrap inner">
        <div class="links">
          <a href="/about" data-i18n="nav.about">About</a>
          <a href="/updates" data-i18n="nav.updates">Updates</a>
          <a href="/privacy" data-i18n="nav.privacy">Privacy</a>
          <a href="/terms" data-i18n="nav.terms">Terms</a>
          <a href="mailto:nkimwalker@gmail.com" data-i18n="nav.support">Support</a>
          <a href="mailto:nkimwalker@gmail.com">nkimwalker@gmail.com</a>
        </div>
        <p class="copy" data-i18n="common.copy">© 2026 Pagewalker. All rights reserved.</p>
      </div>
    </footer>

    <script src="/js/pw-i18n.js"></script>
    <script src="/js/pw-theme.js"></script>
    <script src="/js/public-config.js"></script>
    <script type="module" src="/js/pw-webapp.js"></script>
  </body>
</html>
